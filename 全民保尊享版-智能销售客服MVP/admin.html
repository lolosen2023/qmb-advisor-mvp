<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全民保尊享版管理端</title>
  <script>
    (function () {
      var saved = localStorage.getItem("qmb-theme");
      var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (saved === "dark" || (!saved && prefersDark)) document.documentElement.classList.add("dark");
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --paper: #ffffff;
      --soft: #f7faf8;
      --ink: #16211e;
      --muted: #65736e;
      --line: #dfe7e2;
      --brand: #08746f;
      --brand-soft: #e5f4f0;
      --green: #1e7b52;
      --green-soft: #e2f3ea;
      --amber: #a76313;
      --amber-soft: #fff2db;
      --red: #bf4138;
      --red-soft: #ffe8e5;
      --shadow: 0 24px 72px rgba(25, 41, 37, .10);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
      font-size: 15px;
    }
    html.dark {
      color-scheme: dark;
      --bg: #101614;
      --paper: #18211f;
      --soft: #202b28;
      --ink: #eef5f1;
      --muted: #aab9b3;
      --line: #33413e;
      --brand: #64d2c6;
      --brand-soft: #173b37;
      --green: #78d7a8;
      --green-soft: #153a2a;
      --amber: #efb260;
      --amber-soft: #3b2b16;
      --red: #ff8f86;
      --red-soft: #3f201e;
      --shadow: 0 24px 72px rgba(0, 0, 0, .34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
    }
    .page {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 22px 0 32px;
      display: grid;
      gap: 16px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(24px, 2.6vw, 34px); line-height: 1.18; }
    .sub { margin: 7px 0 0; color: var(--muted); line-height: 1.6; }
    a, button {
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      padding: 0 13px;
      font: inherit;
      font-size: 13px;
      font-weight: 760;
      text-decoration: none;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: 15px;
      min-width: 0;
    }
    .card.wide { grid-column: 1 / -1; }
    .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }
    strong, .value { font-size: 17px; line-height: 1.35; overflow-wrap: anywhere; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 820;
    }
    .pill.low { color: var(--green); background: var(--green-soft); }
    .pill.medium { color: var(--amber); background: var(--amber-soft); }
    .pill.high { color: var(--red); background: var(--red-soft); }
    .text {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      white-space: pre-line;
    }
    .knowledge {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .knowledge article {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--soft);
    }
    .knowledge h2 {
      margin: 0 0 7px;
      font-size: 14px;
    }
    .knowledge span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 7px;
    }
    .knowledge p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 20px;
      color: var(--muted);
      background: var(--paper);
    }
    @media (max-width: 800px) {
      .grid, .knowledge { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top">
      <div>
        <h1>全民保尊享版管理端</h1>
        <p class="sub">查看最近一次客户咨询的意图、风险、转人工原因和命中的知识主题。</p>
      </div>
      <a href="./index.html">返回客户问答</a>
    </header>

    <section id="emptyState" class="empty">暂无问答记录。请先在客户问答页发送一个问题。</section>

    <section id="adminContent" class="grid" hidden>
      <article class="card"><div class="label">客户问题</div><div id="userMessage" class="value"></div></article>
      <article class="card"><div class="label">意图</div><strong id="intentValue"></strong></article>
      <article class="card"><div class="label">风险等级</div><span id="riskValue" class="pill"></span></article>
      <article class="card"><div class="label">是否转人工</div><strong id="handoffValue"></strong></article>
      <article class="card"><div class="label">建议动作</div><strong id="actionValue"></strong></article>
      <article class="card"><div class="label">更新时间</div><strong id="updatedAt"></strong></article>
      <article class="card wide"><div class="label">客户回复</div><p id="replyValue" class="text"></p></article>
      <article class="card wide"><div class="label">转人工原因</div><p id="handoffReason" class="text"></p></article>
      <article class="card wide"><div class="label">提醒</div><p id="notesValue" class="text"></p></article>
      <article class="card wide"><div class="label">知识主题</div><div id="knowledgeList" class="knowledge"></div></article>
    </section>
  </main>

  <script>
    const actionLabel = { answer_only: "直接回复", ask_one_question: "追问一个低敏问题", guide_to_purchase: "温和引导投保页", handoff: "转人工处理" };
    const riskLabel = { low: "低风险", medium: "中风险", high: "高风险" };
    function $(id) { return document.getElementById(id); }
    function render() {
      const raw = localStorage.getItem("qmb-last-session");
      if (!raw) return;
      const data = JSON.parse(raw);
      $("emptyState").hidden = true;
      $("adminContent").hidden = false;
      $("userMessage").textContent = data.user_message || "";
      $("intentValue").textContent = data.intent || "unknown";
      $("riskValue").textContent = riskLabel[data.risk_level] || data.risk_level || "未知";
      $("riskValue").className = "pill " + (data.risk_level || "low");
      $("handoffValue").textContent = data.handoff_required ? "是" : "否";
      $("actionValue").textContent = actionLabel[data.suggested_next_action] || data.suggested_next_action || "";
      $("updatedAt").textContent = data.updated_at ? new Date(data.updated_at).toLocaleString() : "";
      $("replyValue").textContent = data.customer_reply || "";
      $("handoffReason").textContent = data.handoff_reason || "暂无";
      $("notesValue").textContent = data.notes && data.notes.length ? data.notes.join("\n") : "暂无";
      $("knowledgeList").innerHTML = (data.matched_knowledge || []).map(k => "<article><h2>" + k.title + "</h2><span>" + k.topic + " · " + k.priority + "</span><p>" + k.content + "</p></article>").join("");
    }
    render();
  </script>
</body>
</html>
